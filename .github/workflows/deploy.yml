name: CI and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: spx-production
  cancel-in-progress: false

jobs:
  build:
    name: Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Explicit standalone typecheck so type safety is an auditable gate
      # independent of the bundling/build step.
      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: spx-dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: spx-dist
          path: dist

      - name: Package build artifact
        run: |
          set -euo pipefail
          test -f dist/app.js
          test -f dist/scripts/db-migrate.js
          tar -czf spx-dist.tar.gz dist

      - name: Upload build artifact to server
        env:
          SPX_HOST: ${{ secrets.SPX_HOST }}
          SPX_PORT: ${{ secrets.SPX_PORT || 22 }}
          SPX_SSH_KEY: ${{ secrets.SPX_SSH_KEY }}
          SPX_USER: ${{ secrets.SPX_USER }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${SPX_SSH_KEY}" > ~/.ssh/spx_deploy_key
          chmod 600 ~/.ssh/spx_deploy_key
          ssh-keyscan -p "${SPX_PORT}" "${SPX_HOST}" >> ~/.ssh/known_hosts
          scp -P "${SPX_PORT}" -i ~/.ssh/spx_deploy_key spx-dist.tar.gz "${SPX_USER}@${SPX_HOST}:/tmp/spx-dist-${GITHUB_SHA}.tar.gz"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SPX_HOST }}
          username: ${{ secrets.SPX_USER }}
          key: ${{ secrets.SPX_SSH_KEY }}
          port: ${{ secrets.SPX_PORT || 22 }}
          script: |
            set -euo pipefail

            cd /root/SPX
            DIST_ARTIFACT="/tmp/spx-dist-${{ github.sha }}.tar.gz"
            ROLLBACK_DIST="/tmp/spx-dist-rollback-${{ github.run_id }}.tar.gz"

            # Capture rollback target before fetching new code so we can restore
            # the exact commit if the new build or readiness check fails.
            PREVIOUS_COMMIT=$(git rev-parse HEAD)
            echo "Previous commit: ${PREVIOUS_COMMIT}"

            if [ ! -s "${DIST_ARTIFACT}" ]; then
              echo "Missing build artifact at ${DIST_ARTIFACT}"
              exit 1
            fi

            if [ -d dist ]; then
              tar -czf "${ROLLBACK_DIST}" dist
            else
              rm -f "${ROLLBACK_DIST}"
            fi

            git fetch origin main
            git reset --hard origin/main
            NEW_COMMIT=$(git rev-parse HEAD)
            echo "New commit: ${NEW_COMMIT}"

            rm -rf dist
            tar -xzf "${DIST_ARTIFACT}" -C .
            rm -f "${DIST_ARTIFACT}"
            test -f dist/app.js
            test -f dist/scripts/db-migrate.js

            # Build the runtime image from the CI artifact. If the image build
            # fails, the running container is untouched and we roll source/dist
            # back together.
            if ! docker compose build; then
              echo "docker image build failed; rolling back source/dist to ${PREVIOUS_COMMIT}"
              git reset --hard "${PREVIOUS_COMMIT}"
              rm -rf dist
              if [ -f "${ROLLBACK_DIST}" ]; then
                tar -xzf "${ROLLBACK_DIST}" -C .
              fi
              exit 1
            fi

            # Tag the currently running image as a known-good rollback target
            # before we recreate the container, so the rollback path can restore
            # a proven image even if rebuilding the old source were to fail.
            # `|| true` keeps first-ever deploys (no prior image) from aborting.
            CURRENT_IMAGE=$(docker compose images -q notifier 2>/dev/null | head -n1 || true)
            if [ -n "${CURRENT_IMAGE}" ]; then
              docker tag "${CURRENT_IMAGE}" spx-app:rollback || true
              echo "Tagged current image ${CURRENT_IMAGE} as spx-app:rollback"
            fi

            # The notifier service runs db:migrate before app.js. Worker
            # services wait for notifier health and then start without running
            # migrations, so only one production migration runner exists.
            docker compose up -d --remove-orphans --force-recreate

            docker compose ps

            # Readiness gate. /ready checks whether the notifier/API service can serve HTTP
            # and reach the DB without tying deploy success to upstream SPX
            # poller/session health. Probe the container loopback over this SSH
            # session instead of the public URL so the check is independent of
            # DNS/TLS/proxy state.
            if ! curl -fsS --retry 18 --retry-delay 5 --retry-connrefused --retry-all-errors --connect-timeout 5 --max-time 10 --retry-max-time 90 http://127.0.0.1:3000/ready >/dev/null; then
              echo "Readiness check failed; rolling back to ${PREVIOUS_COMMIT}"
              git reset --hard "${PREVIOUS_COMMIT}"
              rm -rf dist
              if [ -f "${ROLLBACK_DIST}" ]; then
                tar -xzf "${ROLLBACK_DIST}" -C .
                if ! docker compose build; then
                  echo "Rollback rebuild failed; restoring tagged rollback image"
                  docker tag spx-app:rollback spx-app:latest
                fi
              else
                echo "No previous dist snapshot; restoring tagged rollback image"
                docker tag spx-app:rollback spx-app:latest
              fi
              docker compose up -d --remove-orphans --force-recreate
              exit 1
            fi

            rm -f "${ROLLBACK_DIST}"
            echo "Deploy succeeded: ${NEW_COMMIT}"

      # Notify on failure. DISCORD_WEBHOOK_URL must be configured as a GitHub
      # Actions secret for this step to post; if unset the step is a no-op.
      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "DISCORD_WEBHOOK_URL not set; skipping failure notification"
            exit 0
          fi
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -fsS -H "Content-Type: application/json" \
            -d "{\"content\": \"❌ SPX production deploy failed on \`${GITHUB_REF_NAME}\` (${GITHUB_SHA}). Run: ${RUN_URL}\"}" \
            "${DISCORD_WEBHOOK_URL}" >/dev/null
