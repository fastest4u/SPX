name: CI and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: spx-production
  cancel-in-progress: true

jobs:
  build:
    name: Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  deploy:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SPX_HOST }}
          username: ${{ secrets.SPX_USER }}
          key: ${{ secrets.SPX_SSH_KEY }}
          port: ${{ secrets.SPX_PORT || 22 }}
          script: |
            set -e
            cd /root/SPX
            git fetch origin main
            git reset --hard origin/main
            docker compose up --build -d
            docker compose ps
            curl -fsS --retry 10 --retry-delay 3 https://www.pathwaylogistic.com/health >/dev/null
