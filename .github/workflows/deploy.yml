name: CI and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: spx-production
  cancel-in-progress: false

jobs:
  build:
    name: Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  deploy:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SPX_HOST }}
          username: ${{ secrets.SPX_USER }}
          key: ${{ secrets.SPX_SSH_KEY }}
          port: ${{ secrets.SPX_PORT || 22 }}
          script: |
            set -euo pipefail

            cd /root/SPX

            # Capture rollback target before fetching new code so we can restore
            # the exact commit if the new build fails its health check.
            PREVIOUS_COMMIT=$(git rev-parse HEAD)
            echo "Previous commit: ${PREVIOUS_COMMIT}"

            git fetch origin main
            git reset --hard origin/main
            NEW_COMMIT=$(git rev-parse HEAD)
            echo "New commit: ${NEW_COMMIT}"

            # Run DB migrations BEFORE swapping containers. If migrations fail
            # the running container is untouched.
            if [ -f docker-compose.yml ] || [ -f compose.yml ]; then
              docker compose run --rm --no-deps app npm run db:migrate || {
                echo "Migration failed; aborting deploy."
                git reset --hard "${PREVIOUS_COMMIT}"
                exit 1
              }
            fi

            # Build new images first; only swap containers if the build succeeds.
            docker compose build

            # Bring up the new stack. --remove-orphans removes containers from
            # services that were deleted; --force-recreate ensures the new
            # image is in use.
            docker compose up -d --remove-orphans --force-recreate

            docker compose ps

            # Health gate. If the service is not healthy within ~60s, roll back
            # to the previous commit and redeploy from there.
            if ! curl -fsS --retry 12 --retry-delay 5 --max-time 90 https://www.pathwaylogistic.com/health >/dev/null; then
              echo "Health check failed; rolling back to ${PREVIOUS_COMMIT}"
              git reset --hard "${PREVIOUS_COMMIT}"
              docker compose up -d --build --remove-orphans
              exit 1
            fi

            echo "Deploy succeeded: ${NEW_COMMIT}"
