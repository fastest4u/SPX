name: CI and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: spx-production
  cancel-in-progress: false

jobs:
  build:
    name: Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  deploy:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SPX_HOST }}
          username: ${{ secrets.SPX_USER }}
          key: ${{ secrets.SPX_SSH_KEY }}
          port: ${{ secrets.SPX_PORT || 22 }}
          script: |
            set -euo pipefail

            cd /root/SPX

            # Capture rollback target before fetching new code so we can restore
            # the exact commit if the new build or health check fails.
            PREVIOUS_COMMIT=$(git rev-parse HEAD)
            echo "Previous commit: ${PREVIOUS_COMMIT}"

            git fetch origin main
            git reset --hard origin/main
            NEW_COMMIT=$(git rev-parse HEAD)
            echo "New commit: ${NEW_COMMIT}"

            # Build the new image first. If the build fails the running
            # container is untouched and we just roll the working tree back.
            if ! docker compose build; then
              echo "docker build failed; rolling back source to ${PREVIOUS_COMMIT}"
              git reset --hard "${PREVIOUS_COMMIT}"
              exit 1
            fi

            # Container's CMD already runs `db:migrate && app.js`, so a single
            # `compose up -d` does build->migrate->start in order. No external
            # `npm run db:migrate` needed (production image is dev-deps stripped).
            docker compose up -d --remove-orphans --force-recreate

            docker compose ps

            # Readiness gate. /ready checks whether the new app can serve HTTP
            # and reach the DB without tying deploy success to upstream SPX
            # poller/session health.
            if ! curl -fsS --retry 12 --retry-delay 5 --max-time 90 https://www.pathwaylogistic.com/ready >/dev/null; then
              echo "Readiness check failed; rolling back to ${PREVIOUS_COMMIT}"
              git reset --hard "${PREVIOUS_COMMIT}"
              docker compose up -d --build --remove-orphans --force-recreate
              exit 1
            fi

            echo "Deploy succeeded: ${NEW_COMMIT}"
