services:
  app:
    build: .
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    volumes:
      - ./.env:/app/.env
      - ./notify-rules.json:/app/notify-rules.json
      - ./data:/app/data
    restart: unless-stopped
    # `exec` makes node replace sh as PID 1 so SIGTERM reaches the app and the
    # graceful shutdown path (detail-job drain, save-queue flush, final
    # metrics) actually runs on deploys. Grace period covers the worst case:
    # active-tick wait + 30s detail-drain deadline + ~33s of save-queue flush
    # retries against a failing DB.
    command: ["sh", "-c", "node dist/scripts/db-migrate.js && exec node dist/app.js"]
    stop_grace_period: 90s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
